name: ci

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Zig 0.16
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: Check Zig formatting
        run: zig fmt --check src build.zig
      - name: Build pinned external trust anchors
        env:
          CADICAL_TAG: rel-3.0.1
          DRAT_TRIM_SHA: 2e3b2dc0ecf938addbd779d42877b6ed69d9a985
          ABC_SHA: bcfdf592289a408cd67ec19260f8a60a37b085b6
        run: |
          git clone --branch "$CADICAL_TAG" --depth 1 https://github.com/arminbiere/cadical.git third_party/cadical
          (cd third_party/cadical && ./configure && make -j2)

          git init third_party/drat-trim
          git -C third_party/drat-trim remote add origin https://github.com/marijnheule/drat-trim.git
          git -C third_party/drat-trim fetch --depth 1 origin "$DRAT_TRIM_SHA"
          git -C third_party/drat-trim checkout --detach FETCH_HEAD
          make -C third_party/drat-trim -j2

          git init third_party/abc
          git -C third_party/abc remote add origin https://github.com/berkeley-abc/abc.git
          git -C third_party/abc fetch --depth 1 origin "$ABC_SHA"
          git -C third_party/abc checkout --detach FETCH_HEAD
          make -C third_party/abc -j2 ABC_USE_NO_READLINE=1
      - name: Unit + integration tests
        run: zig build test
      - name: Build umbrella + spin-offs + IPASIR
        run: zig build
      - name: Doctor + fail-closed trust report + universal
        run: |
          ./zig-out/bin/logic-zig doctor
          ./zig-out/bin/logic-zig trust-report
          ./zig-out/bin/logic-zig taxonomy
          ./zig-out/bin/logic-zig museum
          ./zig-out/bin/logic-zig giants
          ./zig-out/bin/logic-zig edge-suite
      - name: Golden corpus (builtin + AIGER manifest + DRAT)
        run: ./zig-out/bin/logic-hwmcc golden
      - name: DRAT-trim unit + fuzz
        run: |
          ./zig-out/bin/logic-sat check-drat corpus/bench/sat/simple_unsat.cnf
          ./zig-out/bin/logic-sat drat-fuzz --iters 20 --vars 5
      - name: Portfolio hard smoke (small suite)
        run: ./zig-out/bin/logic-sat hard --dir corpus/bench/sat --limit 12 --conflicts 100000
      - name: Portfolio sat_hard sample
        run: ./zig-out/bin/logic-sat hard --dir corpus/bench/sat_hard --limit 3 --conflicts 150000
      - name: SAT competition track (s/v + portfolio + proof)
        run: |
          ./zig-out/bin/logic-zig sat-track corpus/bench/sat/simple_unsat.cnf --proof
          ./zig-out/bin/logic-zig sat-track corpus/bench/sat/simple_sat.cnf --max-conflicts 100000
          ./zig-out/bin/logic-zig sat-track corpus/bench/sat_comp/false.cnf --portfolio --budget 100000 --proof
          ./zig-out/bin/logic-zig sat-track corpus/bench/sat_comp/ph3.cnf --portfolio --budget 200000
      - name: Industrial SAT scoreboard vs CaDiCaL
        run: |
          ./zig-out/bin/logic-zig sat-scoreboard --dir corpus/bench/sat --limit 20 --conflicts 150000
          ./zig-out/bin/logic-zig sat-scoreboard --dir corpus/bench/sat_comp --limit 15 --conflicts 200000
          ./zig-out/bin/logic-zig sat-scoreboard --dir corpus/bench/sat_hard --limit 8 --conflicts 250000 --industrial
      - name: ABC delta path
        run: ./zig-out/bin/logic-zig abc-delta corpus/golden/aiger/stuck0.aag --frames 12
      - name: Agent multishot stress
        run: |
          ./zig-out/bin/logic-agent stress --queries 500 --vars 10
          ./zig-out/bin/logic-agent warm-cold --queries 100 --vars 8
          ./zig-out/bin/logic-agent warm-cold --structured --queries 120 --vars 12
      - name: HWMCC stack + fair-demo + designs + cert
        run: |
          ./zig-out/bin/logic-hwmcc fair-demo
          ./zig-out/bin/logic-hwmcc designs-demo
          ./zig-out/bin/logic-hwmcc stack
          ./zig-out/bin/logic-hwmcc track corpus/golden/aiger/stuck0.aag --frames 12 --cert
      - name: Spin-off smoke
        run: |
          ./zig-out/bin/logic-agent session-demo
          ./zig-out/bin/logic-sat portfolio corpus/bench/sat/simple_unsat.cnf --proof
          ./zig-out/bin/logic-cert pdr-demo
          ./zig-out/bin/logic-cert suite
          ./zig-out/bin/logic-smt demo-add
          ./zig-out/bin/logic-ctl demo
          ./zig-out/bin/ipasir-consumer
          ./zig-out/bin/logic-hwmcc track corpus/golden/aiger/stuck0.aag --frames 8
          ./zig-out/bin/logic-hwmcc track corpus/golden/aiger/const1_bad.aag --frames 4
          ./zig-out/bin/logic-hwmcc track corpus/golden/aiger/stuck0.aag --frames 12 --cert

  lean-oracle:
    name: Lean oracle and kernel checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Reject trust escapes
        run: |
          if rg -n '\b(sorry|admit|axiom|unsafe)\b' lean --glob '*.lean'; then
            echo 'Lean oracle contains a forbidden trust escape.' >&2
            exit 1
          fi
      - name: Build and check Lean oracle
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: lean
          build: true
          test: false
          leanchecker: true
